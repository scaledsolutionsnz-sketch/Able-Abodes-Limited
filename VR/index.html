<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explore Our Interior Spaces in VR | Able Abodes</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

  <!-- A-Frame VR scene (fullscreen, renders behind HTML layers) -->
  <a-scene vr-mode-ui="enabled: true" loading-screen="enabled: false">
    <a-assets timeout="30000">
      <video id="vr-video"
             src="https://cdn.aframe.io/360-video-boilerplate/video/city.mp4"
             crossorigin="anonymous"
             loop
             playsinline
             muted>
      </video>
    </a-assets>

    <!-- 360-degree video sphere -->
    <a-videosphere src="#vr-video" rotation="0 -90 0"></a-videosphere>

    <!-- In-scene floating title (revealed on enter) -->
    <a-text id="scene-title"
            value="Explore Our Interior Spaces in VR."
            position="0 0.2 -3"
            align="center"
            color="#c8a96e"
            width="5"
            visible="false">
    </a-text>

    <!-- Camera rig -->
    <a-entity id="camera-rig" position="0 1.6 0">
      <a-entity camera look-controls wasd-controls></a-entity>
    </a-entity>
  </a-scene>

  <!-- Fixed header (always visible) -->
  <header class="vr-header">
    <a href="../index.html" class="back-link">&#8592; Back to Able Abodes</a>
    <div class="logo">Able <span class="gold">Abodes</span></div>
  </header>

  <!-- Splash overlay (shown before entering) -->
  <div class="vr-overlay" id="vrOverlay">
    <div class="overlay-content">
      <p class="tagline">Virtual Reality Experience</p>
      <h1>Explore Our Interior&nbsp;Spaces in VR.</h1>
      <p class="subtitle">
        Step inside and discover the warmth of our tiny homes.
        Drag to look around in 360&deg;, or use a VR headset for full immersion.
      </p>
      <div class="btn-group">
        <button class="enter-btn" id="enterVR">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
               stroke-linejoin="round" aria-hidden="true">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
          Enter VR Experience
        </button>
      </div>
    </div>
  </div>

  <!-- Controls bar (shown after entering) -->
  <div class="vr-controls hidden" id="vrControls">
    <button class="ctrl-btn" id="exitBtn">&#10005;&nbsp; Exit</button>
    <span class="ctrl-title">Explore Our Interior Spaces in VR.</span>
    <button class="ctrl-btn" id="vrModeBtn">&#9646;&#9646;&nbsp; VR Mode</button>
  </div>

  <script src="index.js"></script>
</body>
</html>
